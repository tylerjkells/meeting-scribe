appId: com.tylerkells.meetingscribe
productName: MeetingScribe
directories:
  buildResources: build
  output: release
files:
  - out/**
  - package.json
  - build/icon.ico
win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
nsis:
  oneClick: true
  perMachine: false
  deleteAppDataOnUninstall: false
  artifactName: MeetingScribe-Setup-${version}.exe
publish:
  provider: github
  owner: tylerjkells
  repo: meeting-scribe
portable:
  artifactName: MeetingScribe-portable.exe
