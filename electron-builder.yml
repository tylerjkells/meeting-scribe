appId: com.tylerkells.meetingscribe
productName: MeetingScribe
directories:
  buildResources: build
  output: release
files:
  - out/**
  - package.json
win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
nsis:
  oneClick: true
  perMachine: false
  deleteAppDataOnUninstall: false
portable:
  artifactName: MeetingScribe-portable.exe
